# GA4GH benchmark overlay: real TES (Docker) + WES workdir on host + Cromwell→GATK (docker.sock).
# Used as: docker compose -f deploy/docker-compose.yml -f demo/docker-compose.ga4gh.yml
#
# Env names follow Ferrum docs: docs/TES-DOCKER-BACKEND.md, docs/WES-WORKFLOW-ENGINES.md.
# FERRUM_GA4GH_DEMO_ROOT must be the absolute path to this demo repo (set by demo/run.sh) so the
# gateway can read the committed Crypt4GH node keypair for DRS encrypt=true ingest + at-rest decrypt on /stream.
services:
  ferrum-gateway:
    build:
      args:
        FERRUM_GATEWAY_FEATURES: tes-docker
    environment:
      FERRUM_ENCRYPTION__CRYPT4GH_KEY_DIR: /data/ferrum/keys
      FERRUM_TES_BACKEND: docker
      FERRUM_TES_WORK_DIR: /tmp/tes-jobs
      FERRUM_WES_WORK_DIR: /wes-runs
      # Same host path as the volume mount below; WES→TES bind uses FERRUM_WES_TES_WORK_HOST_PREFIX.
      FERRUM_WES_TES_WORK_HOST_PREFIX: ${FERUM_WES_WORK_HOST:?set FERUM_WES_WORK_HOST to host abs path}
      FERRUM_WES_TES_WDL_BASH_LAUNCH: "1"
      FERRUM_WES_TES_NEXTFLOW_FILE_LAUNCH: "1"
      FERRUM_TES_DOCKER_MOUNT_SOCKET: "1"
      FERRUM_TES_DOCKER_CLI_HOST_PATH: ${FERRUM_TES_DOCKER_CLI_HOST_PATH:?set by demo/run.sh — host path to static docker}
      # Cromwell/Nextflow invoke `docker`; Ferrum default is docker-host.
      FERRUM_TES_DOCKER_CLI_CONTAINER_PATH: /usr/local/bin/docker
      FERRUM_TES_DOCKER_NETWORK_MODE: ${FERRUM_TES_DOCKER_NETWORK_MODE:?set FERRUM_TES_DOCKER_NETWORK_MODE (compose network)}
      FERRUM_TES_DOCKER_EXTRA_HOSTS: host.docker.internal:host-gateway
      FERRUM_TES_DOCKER_PLATFORM: ${FERRUM_TES_DOCKER_PLATFORM:-}
      FERRUM_DRS_HOSTNAME: ferrum-gateway:8080
    volumes:
      - ${FERRUM_GA4GH_DEMO_ROOT:?set FERRUM_GA4GH_DEMO_ROOT to demo repo abs path}/demo/fixtures/crypt4gh-node:/data/ferrum/keys:ro
      - ${FERUM_WES_WORK_HOST}:/wes-runs
      - /var/run/docker.sock:/var/run/docker.sock
