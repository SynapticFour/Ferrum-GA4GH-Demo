# Ferrum overlay for co-deploy with ga4gh-infra (external auth + service registry).
# Applied when ./run --with-infra is used together with demo/docker-compose.ga4gh-infra.yml.
services:
  ferrum-gateway:
    build:
      context: ${GA4GH_INFRA_SRC}/..
      dockerfile: Ferrum/deploy/Dockerfile.gateway-monorepo
      args:
        FERRUM_GATEWAY_FEATURES: full,tes-docker,external-auth
    environment:
      FERRUM_AUTH__MODE: external
      FERRUM_AUTH__ISSUER: http://aai-broker:8080
      FERRUM_AUTH__JWKS_URL: http://aai-broker:8080/jwks.json
      FERRUM_AUTH__CLEARINGHOUSE: "true"
      FERRUM_SERVICES__ENABLE_PASSPORTS: "false"
      FERRUM_DISCOVERY__ENABLED: "true"
      FERRUM_DISCOVERY__AUTO_REGISTER: "true"
      FERRUM_DISCOVERY__SERVICE_REGISTRY_URL: http://service-registry:8083
      FERRUM_DISCOVERY__REGISTRATION_BASE_URL: http://ferrum-gateway:8080
      SERVICE_REGISTRY_REGISTRATION_KEY: dev-service-registry-key
      ADS_DAC_API_KEY: dev-ads-api-key
    depends_on:
      aai-broker:
        condition: service_healthy
      service-registry:
        condition: service_healthy
