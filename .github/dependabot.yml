version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      github_actions_all:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"

# Cargo updates are currently disabled in this demo repo because Dependabot
# directory-level jobs fail on the vendored Ferrum overlay workspace layout.
# Track Rust dependency upgrades in upstream Ferrum and sync vendor overlays.
